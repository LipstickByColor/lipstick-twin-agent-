<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:44px;height:118px;">
  <!-- tip -->
  <div style="position:absolute;top:0;left:7px;width:30px;height:48px;background:linear-gradient(112deg, rgba(255,255,255,.5), rgba(255,255,255,0) 40%, rgba(0,0,0,.22)), {{ color }};clip-path:polygon(0% 30%, 100% 0%, 100% 100%, 0% 100%);border-radius:0 0 2px 2px;"></div>
  <!-- metallic collar -->
  <div style="position:absolute;top:44px;left:4px;width:36px;height:9px;border-radius:2px;background:linear-gradient(180deg,#f7e2ac 0%,#d0a659 48%,#a97f37 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.65), inset 0 -1.5px 1px rgba(0,0,0,.3);"></div>
  <!-- tube -->
  <div style="position:absolute;top:52px;left:7px;width:30px;height:66px;border-radius:1px 1px 11px 11px;background:linear-gradient(90deg, rgba(0,0,0,.4) 0%, rgba(255,255,255,.18) 24%, rgba(255,255,255,.06) 52%, rgba(0,0,0,.28) 78%, rgba(0,0,0,.44) 100%), linear-gradient(180deg,#3a2130 0%,#271420 60%,#1c0e17 100%);box-shadow:inset 0 -6px 10px rgba(0,0,0,.28);"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:44,&quot;height&quot;:118},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#B06E5F&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { color: this.props.color ?? '#FF2E7E' };
  }
}
</script>
</body>
</html>
